<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi AAC - Star Champs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #FFF9EA; overscroll-behavior-y: contain; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .card-press { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-press:active { transform: scale(0.92); }
        .blend-multiply { mix-blend-mode: multiply; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden selection:bg-amber-200">

    <header class="bg-white shadow-lg z-10 px-4 py-3 flex flex-col gap-3 shrink-0 rounded-b-[2rem] border-b-4 border-amber-200">
        <div class="flex justify-between items-center px-2">
            <h1 class="font-black text-2xl text-amber-600">AAC</h1>
            <div class="bg-amber-50 px-3 py-1 rounded-full border-2 border-amber-200 flex items-center justify-center">
                <img src="https://imgh.in/host/bmiyig" alt="Star Champs" class="h-6 object-contain">
            </div>
        </div>
        <div class="bg-amber-50/50 border-4 border-amber-100 rounded-3xl p-3 min-h-[90px] flex items-center justify-between gap-3 shadow-inner">
            <div id="sentence-display" class="flex-1 flex flex-wrap gap-2 text-xl font-bold text-slate-700 items-center overflow-y-auto max-h-[120px] p-1">
                <span class="text-slate-400 text-base font-medium italic">Tekan gambar untuk menyusun kata...</span>
            </div>
            <div class="flex gap-2 shrink-0 border-l-4 border-amber-100 pl-3">
                <button onclick="clearSentence()" class="bg-rose-100 text-rose-600 p-3 rounded-2xl w-16 h-16 flex flex-col items-center justify-center card-press">🗑️</button>
                <button onclick="speakSentence()" class="bg-amber-500 text-white p-3 rounded-2xl w-16 h-16 flex flex-col items-center justify-center card-press">🗣️</button>
            </div>
        </div>
        <!-- Tambahan: Indikator status suara untuk memudahkan evaluasi -->
        <div id="voice-status" class="text-xs text-center text-slate-400 font-medium px-2 pb-1">
            Memuat suara...
        </div>
    </header>

    <main class="flex-1 flex flex-col overflow-hidden bg-[#FFF9EA]">
        <nav class="shrink-0 p-3 overflow-x-auto no-scrollbar">
            <div id="category-tabs" class="flex gap-3"></div>
        </nav>
        <div class="flex-1 overflow-y-auto p-4 sm:p-6">
            <div id="cards-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 pb-24"></div>
        </div>
    </main>

    <script>
        const vocabularyData = [
            {

                words: [
                    { word: 'Ya', emoji: '👍' }, { word: 'Tidak', emoji: '👎' }, { word: 'Terima kasih', emoji: '🙏' },
                    { word: 'Maaf', emoji: '🥺' }, { word: 'Tolong', emoji: '🤝' }, { word: 'Halo', emoji: '👋' },
                    { word: 'Suka', emoji: '😍' }, { word: 'Tidak suka', image: 'https://imgh.in/host/f8yr5t' }, 
                    { word: 'Permisi', emoji: '🤗' }, { word: 'Mau', emoji: '👐' }, { word: 'Sama', emoji: '🟰' }, { word: 'Berbeda', image: 'https://imgh.in/host/aq9ayn' }
                ]
            },
            {

                words: [
                    { word: 'Saya', image: 'https://imgh.in/host/3nxxzo' }, { word: 'Kamu', image: 'https://imgh.in/host/jfqlv4' },
                    { word: 'Dia', image: 'https://imgh.in/host/vop7t6' }, { word: 'Ibu', emoji: '👩' }, { word: 'Ayah', emoji: '👨' }, 
                    { word: 'Kakak Perempuan', emoji: '👱♀️' }, { word: 'Kakak Laki-laki', emoji: '👦' }, { word: 'Adik', emoji: '👶' }, 
                    { word: 'Suster', emoji: '👩🍼' }, { word: 'Teman', emoji: '👭' }, { word: 'Guru', emoji: '👩🏫' }, 
                    { word: 'Terapis', emoji: '🧑⚕️' }, { word: 'Om', emoji: '👨' }, { word: 'Tante', emoji: '👩' }
                ]
            },
            {
                id: 'makanan', label: 'Makanan', color: 'bg-red-100 border-red-300', icon: '🍎',
                words: [
                    { word: 'Pepaya', image: 'https://imgh.in/host/la9tnt' }, { word: 'Bayam', image: 'https://imgh.in/host/87p17d' },
                    { word: 'Kangkung', image: 'https://imgh.in/host/33bvto' }, { word: 'Wortel', emoji: '🥕' }, { word: 'Melon', emoji: '🍈' }, 
                    { word: 'Mangga', emoji: '🥭' }, { word: 'Pisang', emoji: '🍌' }, { word: 'Stroberi', emoji: '🍓' }, { word: 'Air', image: 'https://imgh.in/host/6pvtzm' },
                    { word: 'Susu', emoji: '🥛' }, { word: 'Sayur', emoji: '🥗' }, { word: 'Kiwi', emoji: '🥝' },
                    { word: 'Kelapa', emoji: '🥥' }, { word: 'Apel', emoji: '🍎' }, { word: 'Brokoli', emoji: '🥦' },
                    { word: 'Jagung', emoji: '🌽' }, { word: 'Roti', emoji: '🍞' }, { word: 'Bluberi', emoji: '🫐' },
                    { word: 'Kentang', emoji: '🥔' }, { word: 'Ayam', emoji: '🍗' }, { word: 'Sup', emoji: '🥣' }, { word: 'Telur', emoji: '🍳' }
                ]
            },
            {
                id: 'binatang', label: 'Binatang', color: 'bg-emerald-100 border-emerald-300', icon: '🐶',
                words: [
                    { word: 'Anjing', emoji: '🐶' }, { word: 'Kucing', emoji: '🐱' }, { word: 'Beruang', emoji: '🐻' },
                    { word: 'Panda', emoji: '🐼' }, { word: 'Sapi', emoji: '🐮' }, { word: 'Katak', emoji: '🐸' },
                    { word: 'Singa', emoji: '🦁' }, { word: 'Kelinci', emoji: '🐰' }, { word: 'Babi', emoji: '🐷' },
                    { word: 'Ayam', emoji: '🐔' }, { word: 'Kuda', emoji: '🐴' }, { word: 'Kura-kura', emoji: '🐢' },
                    { word: 'Ikan', emoji: '🐟' }, { word: 'Zebra', emoji: '🦓' }, { word: 'Hiu', emoji: '🦈' }, { word: 'Burung', emoji: '🦜' }
                ]
            },
            {
                id: 'emosi', label: 'Emosi', color: 'bg-pink-100 border-pink-300', icon: '😊',
                words: [
                    { word: 'Senang', emoji: '😊' }, { word: 'Sedih', emoji: '😢' }, { word: 'Marah', emoji: '😠' },
                    { word: 'Takut', emoji: '😨' }, { word: 'Lelah', emoji: '😮💨' }, { word: 'Sakit', emoji: '🤒' },
                    { word: 'Terkejut', emoji: '😲' }, { word: 'Malu', emoji: '😳' }, { word: 'Bosan', emoji: '😒' },
                    { word: 'Menangis', emoji: '😭' }, { word: 'Tertawa', emoji: '🤣' }, { word: 'Lapar', emoji: '🤤' },
                    { word: 'Haus', emoji: '🥵' }, { word: 'Ngantuk', emoji: '🥱' }
                ]
            },
            {
                id: 'objek', label: 'Benda', color: 'bg-amber-100 border-amber-300', icon: '🧸',
                words: [
                    { word: 'Toilet', emoji: '🚽' }, { word: 'Perut', image: 'https://imgh.in/host/o50vfb' },
                    { word: 'Bola', emoji: '⚽' }, { word: 'Mobil', emoji: '🚗' }, { word: 'Dinosaurus', emoji: '🦖' },
                    { word: 'Boneka', emoji: '🧸' }, { word: 'Sendal', emoji: '🩴' }, { word: 'Buku', emoji: '📚' },
                    { word: 'Balon', emoji: '🎈' }, { word: 'Sikat Gigi', emoji: '🪥' }, { word: 'Tempat Sampah', emoji: '🗑️' },
                    { word: 'Gambar', emoji: '🖼️' }, { word: 'Jam', emoji: '⏰' }, { word: 'Payung', emoji: '☂️' },
                    { word: 'Motor', emoji: '🛵' }, { word: 'Sepeda', emoji: '🚲' }, { word: 'Pesawat', emoji: '🛩️' },
                    { word: 'Helikopter', emoji: '🚁' }, { word: 'Perahu', emoji: '⛵️' }, { word: 'Drum', emoji: '🥁' },
                    { word: 'Piano', emoji: '🎹' }, { word: 'Bunga', emoji: '🌻' }, { word: 'Bintang', emoji: '⭐️' },
                    { word: 'Matahari', emoji: '☀️' }, { word: 'Bumi', emoji: '🌏' }, { word: 'Bulan', emoji: '🌘' }, 
                    { word: 'Awan', emoji: '☁️' }, { word: 'Tas', emoji: '🎒' }, { word: 'Botol', image: 'https://imgh.in/host/3jzvk2' },
                    { word: 'Sepatu', emoji: '👟' }, { word: 'Baju', emoji: '👕' }, { word: 'Celana', emoji: '👖' },
                    { word: 'Pensil', emoji: '✏️' }
                ]
            },
            {
                id: 'tanya', label: 'Tanya', color: 'bg-purple-100 border-purple-300', icon: '❓',
                words: [
                    { word: 'Apa', image: 'https://imgh.in/host/vvs1h0' }, { word: 'Siapa', image: 'https://imgh.in/host/uy41lx' },
                    { word: 'Di mana', image: 'https://imgh.in/host/9sjnmi' }, { word: 'Kenapa', image: 'https://imgh.in/host/ayr83f' },
                    { word: 'Kapan', image: 'https://imgh.in/host/85zfbm' }
                ]
            },
            {
                id: 'alfabet', label: 'Alfabet', color: 'bg-indigo-100 border-indigo-300', icon: 'abc',
                words: Array.from({ length: 26 }, (_, i) => ({ word: String.fromCharCode(97 + i), emoji: String.fromCharCode(97 + i) }))
            },
            {
                id: 'angka', label: 'Angka', color: 'bg-rose-100 border-rose-300', icon: '123',
                words: Array.from({ length: 21 }, (_, i) => ({ word: i.toString(), emoji: i.toString() }))
            },
            {
                id: 'cuaca', label: 'Cuaca', color: 'bg-cyan-100 border-cyan-300', icon: '⛅',
                words: [
                    { word: 'Hujan', emoji: '🌧️' }, { word: 'Cerah', emoji: '☀️' }, { word: 'Salju', emoji: '❄️' },
                    { word: 'Mendung', emoji: '☁️' }, { word: 'Berangin', emoji: '🌬️' }, { word: 'Gugur', emoji: '🍂' }
                ]
            }
        ];

        let currentSentence = [];
        let activeCategoryId = 'frasa';
        let indonesianVoice = null;
        const synth = window.speechSynthesis;

        function loadVoices() {
            const voices = synth.getVoices();
            if (voices.length === 0) return; // Belum dimuat penuh oleh browser
            
            // Prioritas: Google Bahasa Indonesia (paling natural) > Suara ID lainnya
            indonesianVoice = voices.find(v => v.lang === 'id-ID' && v.name.includes('Google')) ||
                              voices.find(v => v.lang === 'id-ID' || v.lang === 'id_ID') ||
                              voices.find(v => v.lang.startsWith('id'));
            
            // HAPUS fallback ke `voices[0]`. Jika tidak ada ID voice bawaan, 
            // kita biarkan null secara adaptif.
            
            const statusEl = document.getElementById('voice-status');
            if (indonesianVoice) {
                statusEl.innerText = "✓ Menggunakan suara: " + indonesianVoice.name;
                statusEl.classList.add('text-emerald-500');
                statusEl.classList.remove('text-amber-500', 'text-slate-400');
            } else {
                statusEl.innerText = "⚠ Suara lokal ID tidak ditemukan. Menggunakan adaptasi online.";
                statusEl.classList.add('text-amber-500');
                statusEl.classList.remove('text-emerald-500', 'text-slate-400');
            }
        }

        if (synth.onvoiceschanged !== undefined) { 
            synth.onvoiceschanged = loadVoices; 
        }
        // Panggil juga sekali di awal (berguna untuk beberapa browser)
        loadVoices();

        // Kamus pelafalan khusus (override pengucapan)
        // Telah ditambahkan ejaan alfabet dan angka agar tetap berlogat Indonesia
        const pronunciationMap = {
            "bluberi": "blu be ri", 
            "sup": "suup", 
            "stroberi": "stro be ri", 
            "melon": "me lon",
            // Alfabet bahasa Indonesia
            "a": "a", "b": "be", "c": "ce", "d": "de", "e": "e",
            "f": "ef", "g": "ge", "h": "ha", "i": "i", "j": "je",
            "k": "ka", "l": "el", "m": "em", "n": "en", "o": "o",
            "p": "pe", "q": "ki", "r": "er", "s": "es", "t": "te",
            "u": "u", "v": "fe", "w": "we", "x": "eks", "y": "ye", "z": "zet",
            // Angka spesifik untuk menghindari pelafalan aneh
            "0": "nol", "1": "satu", "2": "dua", "3": "tiga", "4": "empat",
            "5": "lima", "6": "enam", "7": "tujuh", "8": "delapan", "9": "sembilan",
            "10": "sepuluh"
        };

        function playSound(text) {
            if (synth.speaking) synth.cancel();
            
            // Proses teks untuk memperbaiki pelafalan kata per kata
            let spokenText = text.toLowerCase();
            let wordsArray = spokenText.split(" ");
            let processedText = wordsArray.map(w => pronunciationMap[w] || w).join(" ");

            const utterance = new SpeechSynthesisUtterance(processedText);
            
            // ADAPTIF: Hanya pasang custom voice jika kita yakin itu bahasa Indonesia.
            // Jika tidak ada, biarkan kosong. Browser akan mengandalkan atribut 'lang' di bawah ini
            // untuk menarik suara dari server online / network (misal Google cloud voice di Chrome).
            if (indonesianVoice) {
                utterance.voice = indonesianVoice;
            }
            
            utterance.lang = 'id-ID'; // Wajib, memaksa mode bahasa Indonesia
            utterance.pitch = 1.1; 
            utterance.rate = 0.85; // Sedikit dicepatkan dari 0.75 karena 0.75 kadang membuat suara patah-patah
            
            synth.speak(utterance);
        }

        function addToSentence(word, categoryId) {
            currentSentence.push({ word, categoryId });
            updateSentenceDisplay();
            playSound(word);
        }

        function clearSentence() { currentSentence = []; updateSentenceDisplay(); }

        function speakSentence() {
            let finalWords = [];
            let buffer = "";

            for(let item of currentSentence) {
                // Menggabungkan huruf menjadi satu kata supaya dibaca sebagai kata utuh (misal: a-p-e-l menjadi "apel")
                if(item.categoryId === 'alfabet' || item.categoryId === 'angka') {
                    buffer += item.word;
                } else {
                    if(buffer) { finalWords.push(buffer); buffer = ""; }
                    finalWords.push(item.word);
                }
            }
            if(buffer) finalWords.push(buffer);
            playSound(finalWords.join(" "));
        }

        function updateSentenceDisplay() {
            const disp = document.getElementById('sentence-display');
            disp.innerHTML = currentSentence.length === 0 
                ? '<span class="text-slate-400 text-base font-medium italic">Tekan gambar untuk menyusun kata...</span>' 
                : currentSentence.map(item => `<div class="bg-white p-2 rounded-lg shadow border">${item.word}</div>`).join('');
        }

        function renderCategories() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = vocabularyData.map(cat => `
                <button onclick="switchCategory('${cat.id}')" class="px-4 py-2 rounded-xl bg-white border-b-4 ${activeCategoryId === cat.id ? 'border-amber-500' : 'border-slate-200'} whitespace-nowrap font-bold text-slate-600">
                    ${cat.icon} ${cat.label}
                </button>
            `).join('');
        }

        function renderGrid(categoryId) {
            const container = document.getElementById('cards-grid');
            const cat = vocabularyData.find(c => c.id === categoryId);
            container.innerHTML = cat.words.map(w => `
                <button onclick="addToSentence('${w.word}', '${categoryId}')" class="${cat.color} p-4 rounded-2xl flex flex-col items-center justify-center border-b-4 card-press">
                    ${w.image ? `<img src="${w.image}" class="w-16 h-16 blend-multiply object-contain">` : `<span class="text-5xl drop-shadow-md">${w.emoji}</span>`}
                    <span class="font-bold mt-2 text-sm text-center leading-tight text-slate-700">${w.word}</span>
                </button>
            `).join('');
        }

        function switchCategory(id) { activeCategoryId = id; renderCategories(); renderGrid(id); }

        window.onload = () => { renderCategories(); renderGrid(activeCategoryId); };
    </script>
</body>
</html>
